name: Deploy to Server

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "ITGirl/backend/**"
      - ".github/workflows/deploy-to-server.yml"

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: itgirl
          POSTGRES_USER: itgirl
          POSTGRES_PASSWORD: itgirl
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U itgirl -d itgirl"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    defaults:
      run:
        working-directory: ITGirl/backend
    env:
      DJANGO_SECRET_KEY: ci-secret
      DJANGO_DEBUG: "0"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
      DB_ENGINE: django.db.backends.postgresql
      POSTGRES_DB: itgirl
      POSTGRES_USER: itgirl
      POSTGRES_PASSWORD: itgirl
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      APP_BASE_URL: http://localhost:8000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run migrations
        run: python manage.py migrate
      - name: Run tests
        run: python manage.py test tests

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: ${{ secrets.DEPLOY_HOST != '' && secrets.DEPLOY_USER != '' && secrets.DEPLOY_SSH_KEY != '' && secrets.DEPLOY_PATH != '' && secrets.BACKEND_ENV_FILE != '' && secrets.DEPLOY_PORT != '' }}
    steps:
      - uses: actions/checkout@v4
      - name: Upload backend bundle
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          source: "ITGirl/backend/*"
          target: "${{ secrets.DEPLOY_PATH }}"
          strip_components: 1
      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          script: |
            set -euo pipefail
            mkdir -p "${{ secrets.DEPLOY_PATH }}"
            cd "${{ secrets.DEPLOY_PATH }}"
            cat > .env <<'EOF'
            ${{ secrets.BACKEND_ENV_FILE }}
            EOF
            docker compose pull || true
            docker compose up -d --build
            docker compose exec -T backend python manage.py migrate
            docker compose exec -T backend python manage.py seed_demo
            curl -fsS http://127.0.0.1:8000/healthz

  deploy-missing-secrets:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: ${{ secrets.DEPLOY_HOST == '' || secrets.DEPLOY_USER == '' || secrets.DEPLOY_SSH_KEY == '' || secrets.DEPLOY_PATH == '' || secrets.BACKEND_ENV_FILE == '' || secrets.DEPLOY_PORT == '' }}
    steps:
      - name: Explain missing deploy secrets
        run: |
          echo "Deployment skipped: configure DEPLOY_HOST, DEPLOY_USER, DEPLOY_SSH_KEY, DEPLOY_PATH, BACKEND_ENV_FILE (and optional DEPLOY_PORT)."
